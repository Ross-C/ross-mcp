app = 'ross-mcp-relay'
primary_region = 'lhr'

[build]
  dockerfile = 'relay/Dockerfile'

[env]
  RELAY_HOST = '0.0.0.0'
  RELAY_PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'mcp_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
